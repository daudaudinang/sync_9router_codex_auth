services:
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: codex-sync-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-supersecret}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/setup/minio-init.sh"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-supersecret}
      MINIO_ALIAS: ${MINIO_ALIAS:-local}
      MINIO_BUCKET: ${MINIO_BUCKET:-uploads}
      MINIO_ENDPOINT_INTERNAL: http://minio:9000
    volumes:
      - ./docker/minio-init.sh:/setup/minio-init.sh:ro
    restart: "no"

  codex-sync-runner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: codex-sync-runner
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      DATA_DIR: /data
      CODEX_SYNC_INTERVAL_SEC: ${CODEX_SYNC_INTERVAL_SEC:-300}
      CODEX_SYNC_ACK_TIMEOUT_MS: ${CODEX_SYNC_ACK_TIMEOUT_MS:-5000}
      CODEX_SYNC_POLL_INTERVAL_MS: ${CODEX_SYNC_POLL_INTERVAL_MS:-150}
      CODEX_SYNC_REMOTE_MODE: ${CODEX_SYNC_REMOTE_MODE:-minio}
      CODEX_SYNC_OBJECT_KEY: ${CODEX_SYNC_OBJECT_KEY:-inventory/codex-accounts.json}
      CODEX_SYNC_S3_ENDPOINT: ${CODEX_SYNC_S3_ENDPOINT:-http://minio:9000}
      CODEX_SYNC_S3_BUCKET: ${CODEX_SYNC_S3_BUCKET:-uploads}
      CODEX_SYNC_S3_REGION: ${CODEX_SYNC_S3_REGION:-us-east-1}
      CODEX_SYNC_S3_ACCESS_KEY_ID: ${CODEX_SYNC_S3_ACCESS_KEY_ID:-minioadmin}
      CODEX_SYNC_S3_SECRET_ACCESS_KEY: ${CODEX_SYNC_S3_SECRET_ACCESS_KEY:-supersecret}
      CODEX_SYNC_S3_FORCE_PATH_STYLE: ${CODEX_SYNC_S3_FORCE_PATH_STYLE:-true}
      SYNC_SHARED_KEY: ${SYNC_SHARED_KEY:-}
    volumes:
      - runner-data:/data
      # mount local db.json from host if needed:
      # - ./example-data/db.json:/data/db.json
    restart: unless-stopped

volumes:
  minio-data:
  runner-data:
