<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Codex Sync Dashboard</title>
  <meta name="description" content="Real-time status dashboard for Codex Sync Runner">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0e1a;
      --surface: rgba(255,255,255,0.04);
      --surface-hover: rgba(255,255,255,0.07);
      --border: rgba(255,255,255,0.08);
      --text: #e2e8f0;
      --text-muted: #64748b;
      --text-dim: #475569;
      --accent: #818cf8;
      --accent-glow: rgba(129,140,248,0.15);
      --green: #34d399;
      --green-glow: rgba(52,211,153,0.15);
      --red: #f87171;
      --red-glow: rgba(248,113,113,0.15);
      --yellow: #fbbf24;
      --yellow-glow: rgba(251,191,36,0.15);
      --radius: 16px;
      --radius-sm: 10px;
      --font: 'Inter', -apple-system, sans-serif;
      --mono: 'JetBrains Mono', 'Fira Code', monospace;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* Animated gradient background */
    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(ellipse at 20% 50%, rgba(99,102,241,0.08) 0%, transparent 50%),
                  radial-gradient(ellipse at 80% 20%, rgba(139,92,246,0.06) 0%, transparent 50%),
                  radial-gradient(ellipse at 50% 80%, rgba(59,130,246,0.05) 0%, transparent 50%);
      animation: bgShift 20s ease-in-out infinite alternate;
      z-index: -1;
    }
    @keyframes bgShift {
      0% { transform: translate(0, 0) rotate(0deg); }
      100% { transform: translate(-5%, 3%) rotate(3deg); }
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px 64px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
      animation: fadeUp 0.5s ease;
    }
    .header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #818cf8, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header h1 .icon { font-size: 1.3rem; -webkit-text-fill-color: initial; }
    .status-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .status-badge.ok { background: var(--green-glow); color: var(--green); }
    .status-badge.error { background: var(--red-glow); color: var(--red); }
    .status-badge.syncing { background: var(--yellow-glow); color: var(--yellow); }
    .status-badge.stopped { background: var(--surface); color: var(--text-muted); }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: currentColor;
    }
    .dot.pulse { animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.85); }
    }

    /* Cards grid */
    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    @media (max-width: 640px) {
      .cards { grid-template-columns: 1fr; }
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      transition: all 0.2s ease;
      animation: fadeUp 0.5s ease both;
    }
    .card:nth-child(2) { animation-delay: 0.06s; }
    .card:nth-child(3) { animation-delay: 0.12s; }
    .card:hover {
      background: var(--surface-hover);
      border-color: rgba(255,255,255,0.12);
      transform: translateY(-2px);
    }
    .card-label {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .card-value {
      font-size: 1.6rem;
      font-weight: 700;
      font-family: var(--mono);
    }
    .card-sub {
      font-size: 0.78rem;
      color: var(--text-dim);
      margin-top: 4px;
    }

    /* Progress bar */
    .progress-wrap {
      margin-top: 12px;
      background: rgba(255,255,255,0.06);
      border-radius: 6px;
      height: 6px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      border-radius: 6px;
      background: linear-gradient(90deg, #818cf8, #c084fc);
      transition: width 1s linear;
    }

    /* Section */
    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 24px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      animation: fadeUp 0.6s ease both;
    }
    .section-title {
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Counts table */
    .counts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 12px;
    }
    .count-item {
      text-align: center;
      padding: 12px 8px;
      border-radius: var(--radius-sm);
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.04);
    }
    .count-item .num {
      font-size: 1.4rem;
      font-weight: 700;
      font-family: var(--mono);
      color: var(--accent);
    }
    .count-item .label {
      font-size: 0.68rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 4px;
    }
    .count-item.warn .num { color: var(--yellow); }
    .count-item.danger .num { color: var(--red); }
    .count-item.success .num { color: var(--green); }

    /* Buttons */
    .actions {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      animation: fadeUp 0.65s ease both;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--text);
      font-family: var(--font);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      backdrop-filter: blur(12px);
    }
    .btn:hover:not(:disabled) {
      background: var(--surface-hover);
      border-color: var(--accent);
      box-shadow: 0 0 20px var(--accent-glow);
      transform: translateY(-1px);
    }
    .btn:active:not(:disabled) { transform: translateY(0); }
    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .btn-primary {
      background: linear-gradient(135deg, rgba(129,140,248,0.15), rgba(192,132,252,0.1));
      border-color: rgba(129,140,248,0.3);
    }

    /* Accounts table */
    .table-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
    }
    th {
      text-align: left;
      padding: 10px 12px;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 10px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      font-family: var(--mono);
      font-size: 0.78rem;
    }
    tr:hover td {
      background: rgba(255,255,255,0.02);
    }
    .tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 0.68rem;
      font-weight: 600;
    }
    .tag.ok { background: var(--green-glow); color: var(--green); }
    .tag.warn { background: var(--yellow-glow); color: var(--yellow); }
    .tag.err { background: var(--red-glow); color: var(--red); }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 12px 20px;
      border-radius: var(--radius-sm);
      font-size: 0.82rem;
      font-weight: 500;
      background: var(--surface);
      border: 1px solid var(--border);
      backdrop-filter: blur(16px);
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 1000;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-color: rgba(52,211,153,0.3); color: var(--green); }
    .toast.error { border-color: rgba(248,113,113,0.3); color: var(--red); }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Reject reasons */
    .reject-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 8px;
      margin-top: 12px;
    }
    .reject-item {
      display: flex;
      justify-content: space-between;
      padding: 6px 10px;
      border-radius: 6px;
      background: rgba(255,255,255,0.02);
      font-size: 0.72rem;
    }
    .reject-item .rname { color: var(--text-muted); }
    .reject-item .rcount { font-family: var(--mono); font-weight: 600; }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid var(--text-muted);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Footer */
    .footer {
      text-align: center;
      padding: 24px 0;
      color: var(--text-dim);
      font-size: 0.72rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <h1><span class="icon">⚡</span> Codex Sync Dashboard</h1>
      <div id="statusBadge" class="status-badge stopped">
        <span class="dot"></span>
        <span id="statusText">Loading…</span>
      </div>
    </header>

    <!-- Top cards -->
    <div class="cards">
      <div class="card">
        <div class="card-label">Runner State</div>
        <div class="card-value" id="runnerState">—</div>
        <div class="card-sub" id="runnerUptime"></div>
      </div>
      <div class="card">
        <div class="card-label">Last Sync Outcome</div>
        <div class="card-value" id="lastOutcome">—</div>
        <div class="card-sub" id="lastSyncTime"></div>
      </div>
      <div class="card">
        <div class="card-label">Next Sync</div>
        <div class="card-value" id="countdown">—</div>
        <div class="progress-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
        <div class="card-sub" id="nextSyncAt"></div>
      </div>
    </div>

    <!-- Last sync counts -->
    <div class="section" id="countsSection">
      <div class="section-title">📊 Last Sync Counts</div>
      <div class="counts-grid" id="countsGrid"></div>
      <div id="rejectSection" style="display:none">
        <div class="section-title" style="margin-top:16px;margin-bottom:8px">⚠️ Reject Reasons</div>
        <div class="reject-grid" id="rejectGrid"></div>
      </div>
    </div>

    <!-- Actions -->
    <div class="actions">
      <button class="btn btn-primary" id="btnSyncNow" onclick="triggerSync(false)">
        🔄 Sync Now
      </button>
      <button class="btn" id="btnDryRun" onclick="triggerSync(true)">
        🔍 Dry Run
      </button>
    </div>

    <!-- Accounts -->
    <div class="section">
      <div class="section-title">
        👤 Accounts
        <span id="accountCount" style="color:var(--accent);font-family:var(--mono)"></span>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Email</th>
              <th>Rev</th>
              <th>Status</th>
              <th>Token</th>
              <th>Last Synced</th>
            </tr>
          </thead>
          <tbody id="accountsBody">
            <tr><td colspan="5" style="text-align:center;color:var(--text-muted)">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="footer">
      Codex Sync Runner v0.1 — Auto-refresh every 5s
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let statusData = null;
    let nextScheduledAt = null;
    let syncIntervalSec = 300;
    let countdownRaf = null;

    // ---- API calls ----
    async function fetchStatus() {
      try {
        const res = await fetch('/api/status');
        statusData = await res.json();
        renderStatus(statusData);
      } catch (e) {
        setBadge('stopped', 'Offline');
      }
    }

    async function fetchAccounts() {
      try {
        const res = await fetch('/api/accounts');
        const data = await res.json();
        renderAccounts(data);
      } catch { /* silent */ }
    }

    async function triggerSync(dryRun) {
      const btn = dryRun ? document.getElementById('btnDryRun') : document.getElementById('btnSyncNow');
      btn.disabled = true;
      btn.innerHTML = `<span class="spinner"></span> ${dryRun ? 'Queueing…' : 'Syncing…'}`;

      try {
        const url = dryRun ? '/api/sync-now?dryRun=true' : '/api/sync-now';
        const res = await fetch(url, { method: 'POST' });
        const data = await res.json();
        showToast(data.status === 'success' ? 'success' : 'error',
          data.status === 'success' ? '✅ Sync enqueued' : `❌ ${data.code || 'Error'}`);

        // Refresh after short delay to pick up result
        setTimeout(() => { fetchStatus(); fetchAccounts(); }, 3000);
      } catch (e) {
        showToast('error', '❌ Request failed');
      } finally {
        btn.disabled = false;
        btn.innerHTML = dryRun ? '🔍 Dry Run' : '🔄 Sync Now';
      }
    }

    // ---- Render ----
    function renderStatus(s) {
      const state = s.runnerState || 'unknown';
      const isRunning = state.includes('running');
      const isSyncing = state.includes('syncing');
      const isStopped = state === 'runner_stopped';

      // Badge
      if (isSyncing) setBadge('syncing', 'Syncing');
      else if (isRunning) setBadge('ok', 'Running');
      else if (isStopped) setBadge('stopped', 'Stopped');
      else setBadge('error', state);

      // Runner state card
      const stateLabel = isSyncing ? '🔄 SYNCING' : isRunning ? '🟢 IDLE' : '⭕ STOPPED';
      document.getElementById('runnerState').textContent = stateLabel;

      if (s.service?.startedAt) {
        document.getElementById('runnerUptime').textContent = `Up ${timeAgo(s.service.startedAt)}`;
      }

      // Last sync
      const lr = s.lastRun;
      if (lr) {
        const outcomeMap = {
          sync_success: '✅ OK',
          sync_partial: '⚠️ Partial',
          sync_rejected: '❌ Rejected',
          sync_failed: '❌ Failed',
          never_run: '— Never',
        };
        document.getElementById('lastOutcome').textContent = outcomeMap[lr.outcome] || lr.outcome;
        document.getElementById('lastSyncTime').textContent = lr.endedAt
          ? timeAgo(lr.endedAt) + ' ago'
          : '';

        renderCounts(lr.counts, lr.rejectReasons);
      }

      // Countdown
      if (s.service?.nextScheduledAt) {
        nextScheduledAt = new Date(s.service.nextScheduledAt).getTime();
        syncIntervalSec = s.service.syncIntervalSec || 300;
        document.getElementById('nextSyncAt').textContent =
          new Date(s.service.nextScheduledAt).toLocaleTimeString();
        startCountdown();
      }
    }

    function renderCounts(counts, rejectReasons) {
      if (!counts) return;
      const items = [
        { key: 'recordsScanned', label: 'Scanned' },
        { key: 'recordsValid', label: 'Valid', cls: 'success' },
        { key: 'recordsRejected', label: 'Rejected', cls: counts.recordsRejected > 0 ? 'danger' : '' },
        { key: 'pushedToRemote', label: 'Pushed', cls: counts.pushedToRemote > 0 ? 'success' : '' },
        { key: 'pulledFromRemote', label: 'Pulled', cls: counts.pulledFromRemote > 0 ? 'success' : '' },
        { key: 'unchanged', label: 'Unchanged' },
        { key: 'equalRevisionPayloadConflictResolved', label: 'Conflicts', cls: counts.equalRevisionPayloadConflictResolved > 0 ? 'warn' : '' },
      ];

      document.getElementById('countsGrid').innerHTML = items.map(i => `
        <div class="count-item ${i.cls || ''}">
          <div class="num">${counts[i.key] ?? 0}</div>
          <div class="label">${i.label}</div>
        </div>
      `).join('');

      // Reject reasons
      const rSection = document.getElementById('rejectSection');
      const rGrid = document.getElementById('rejectGrid');
      if (rejectReasons && Object.values(rejectReasons).some(v => v > 0)) {
        rSection.style.display = '';
        rGrid.innerHTML = Object.entries(rejectReasons).map(([k, v]) => `
          <div class="reject-item">
            <span class="rname">${k.replace(/_/g, ' ')}</span>
            <span class="rcount" style="color:${v > 0 ? 'var(--red)' : 'var(--text-dim)'}">${v}</span>
          </div>
        `).join('');
      } else {
        rSection.style.display = 'none';
      }
    }

    function renderAccounts(data) {
      const el = document.getElementById('accountsBody');
      const countEl = document.getElementById('accountCount');
      if (!data?.records?.length) {
        countEl.textContent = '(0)';
        el.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--text-muted)">No accounts</td></tr>';
        return;
      }
      countEl.textContent = `(${data.total})`;
      el.innerHTML = data.records.map(r => {
        const statusCls = r.testStatus === 'active' ? 'ok' : r.testStatus === 'error' ? 'err' : 'warn';
        const tokenOk = r.hasAccessToken && r.hasRefreshToken;
        return `<tr>
          <td style="color:var(--text)">${escHtml(r.email || '—')}</td>
          <td>${r.inventoryRevision ?? '—'}</td>
          <td><span class="tag ${statusCls}">${r.testStatus || '—'}</span></td>
          <td>${tokenOk ? '<span class="tag ok">✓</span>' : '<span class="tag err">✗</span>'}</td>
          <td style="color:var(--text-dim)">${r.inventorySyncUpdatedAt ? shortTime(r.inventorySyncUpdatedAt) : '—'}</td>
        </tr>`;
      }).join('');
    }

    // ---- Countdown ----
    function startCountdown() {
      if (countdownRaf) cancelAnimationFrame(countdownRaf);
      function tick() {
        const now = Date.now();
        const remaining = Math.max(0, nextScheduledAt - now);
        const secs = Math.ceil(remaining / 1000);
        const mm = String(Math.floor(secs / 60)).padStart(2, '0');
        const ss = String(secs % 60).padStart(2, '0');
        document.getElementById('countdown').textContent = `${mm}:${ss}`;

        const totalMs = syncIntervalSec * 1000;
        const elapsed = totalMs - remaining;
        const pct = Math.min(100, (elapsed / totalMs) * 100);
        document.getElementById('progressBar').style.width = pct + '%';

        if (remaining > 0) {
          countdownRaf = requestAnimationFrame(tick);
        } else {
          document.getElementById('countdown').textContent = '00:00';
          document.getElementById('progressBar').style.width = '100%';
          // Refresh status after sync should complete
          setTimeout(() => { fetchStatus(); fetchAccounts(); }, 2000);
        }
      }
      tick();
    }

    // ---- Helpers ----
    function setBadge(cls, text) {
      const badge = document.getElementById('statusBadge');
      const dot = badge.querySelector('.dot');
      badge.className = `status-badge ${cls}`;
      dot.className = cls === 'syncing' ? 'dot pulse' : 'dot';
      document.getElementById('statusText').textContent = text;
    }

    function timeAgo(iso) {
      const diff = Date.now() - new Date(iso).getTime();
      if (diff < 60000) return Math.floor(diff / 1000) + 's';
      if (diff < 3600000) return Math.floor(diff / 60000) + 'm';
      if (diff < 86400000) return Math.floor(diff / 3600000) + 'h';
      return Math.floor(diff / 86400000) + 'd';
    }

    function shortTime(iso) {
      try { return new Date(iso).toLocaleTimeString(); } catch { return iso; }
    }

    function escHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function showToast(type, msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `toast ${type} show`;
      setTimeout(() => { t.className = 'toast'; }, 3000);
    }

    // ---- Init ----
    fetchStatus();
    fetchAccounts();
    setInterval(fetchStatus, 5000);
    setInterval(fetchAccounts, 15000);
  </script>
</body>
</html>
